name: CI

# Green/red gate: a startup-crashing or import-breaking commit fails CI here
# instead of taking down production.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        # 3.11 matches the Dockerfile base. mcp>=1.2.0 needs Python 3.10+,
        # so on CI the mcp-dependent modules import for real (no xfail).
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: pytest -q
