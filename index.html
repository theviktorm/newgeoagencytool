<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Momentus AI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════════════
   MOMENTUS AI DASHBOARD — Command Center Aesthetic
   Dark Bloomberg × Datadog × Linear
   ═══════════════════════════════════════════════════════════════ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-root: #080B12;
  --bg-base: #0D1117;
  --bg-surface: #151B26;
  --bg-raised: #1C2333;
  --bg-overlay: #232B3D;
  --bg-hover: #2A3448;
  --bg-active: #313D54;
  --border-subtle: rgba(148, 163, 184, 0.08);
  --border-default: rgba(148, 163, 184, 0.14);
  --border-strong: rgba(148, 163, 184, 0.22);
  --text-primary: #E2E8F0;
  --text-secondary: #94A3B8;
  --text-tertiary: #64748B;
  --text-muted: #475569;
  --blue: #3B82F6;
  --blue-dim: rgba(59, 130, 246, 0.15);
  --blue-glow: rgba(59, 130, 246, 0.3);
  --emerald: #10B981;
  --emerald-dim: rgba(16, 185, 129, 0.15);
  --amber: #F59E0B;
  --amber-dim: rgba(245, 158, 11, 0.15);
  --rose: #F43F5E;
  --rose-dim: rgba(244, 63, 94, 0.15);
  --purple: #8B5CF6;
  --purple-dim: rgba(139, 92, 246, 0.15);
  --cyan: #06B6D4;
  --cyan-dim: rgba(6, 182, 212, 0.15);
  --font-sans: 'Instrument Sans', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', 'SF Mono', monospace;
  --sidebar-w: 240px;
  --header-h: 56px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--font-sans);
  background: var(--bg-root);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  line-height: 1.5;
}

/* ─── LAYOUT ─── */
.app-shell { display: flex; height: 100vh; }

.sidebar {
  width: var(--sidebar-w);
  background: var(--bg-base);
  border-right: 1px solid var(--border-default);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  gap: 10px;
}

.sidebar-logo .logo-mark {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: linear-gradient(135deg, var(--blue), var(--purple));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 12px;
  color: white;
}

.sidebar-logo .logo-text {
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.02em;
}

.sidebar-logo .logo-sub {
  font-size: 10px;
  color: var(--text-tertiary);
  font-family: var(--font-mono);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.sidebar-section {
  padding: 12px 0;
}

.sidebar-section-label {
  padding: 0 20px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.sidebar-item {
  padding: 8px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--text-secondary);
  transition: all 0.15s;
  border-left: 2px solid transparent;
  font-size: 13px;
}

.sidebar-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.sidebar-item.active {
  background: var(--blue-dim);
  color: var(--blue);
  border-left-color: var(--blue);
  font-weight: 500;
}

.sidebar-item .item-icon {
  width: 16px;
  text-align: center;
  font-size: 14px;
  opacity: 0.7;
}

.sidebar-item .item-badge {
  margin-left: auto;
  background: var(--bg-overlay);
  color: var(--text-tertiary);
  font-size: 10px;
  font-family: var(--font-mono);
  padding: 1px 6px;
  border-radius: 10px;
  min-width: 20px;
  text-align: center;
}

.sidebar-item.active .item-badge {
  background: var(--blue-dim);
  color: var(--blue);
}

.sidebar-divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 4px 16px;
}

.sidebar-bottom {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--border-subtle);
}

.ws-selector {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 12px;
  width: 100%;
  cursor: pointer;
  font-family: var(--font-sans);
}

.ws-selector option {
  background: var(--bg-raised);
}

/* ─── MAIN CONTENT ─── */
.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}

.main-header {
  height: var(--header-h);
  border-bottom: 1px solid var(--border-default);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 16px;
  flex-shrink: 0;
  background: var(--bg-base);
}

.main-header .page-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.main-header .header-meta {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text-tertiary);
}

.main-header .status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--emerald);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.main-header .user-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  padding: 4px 10px 4px 4px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
}

.main-header .user-pill:hover { border-color: var(--border-strong); }

.main-header .user-avatar {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 600;
  color: white;
}

.main-body {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ─── CARDS ─── */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 8px;
  overflow: hidden;
}

.card-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.card-header .card-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-secondary);
}

.card-body { padding: 18px; }

/* ─── METRIC CARDS ─── */
.metrics-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}

.metric-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 8px;
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
}

.metric-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
}

.metric-card.blue::before { background: var(--blue); }
.metric-card.emerald::before { background: var(--emerald); }
.metric-card.amber::before { background: var(--amber); }
.metric-card.purple::before { background: var(--purple); }
.metric-card.cyan::before { background: var(--cyan); }
.metric-card.rose::before { background: var(--rose); }

.metric-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  margin-bottom: 6px;
}

.metric-value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.1;
}

.metric-delta {
  font-family: var(--font-mono);
  font-size: 11px;
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 4px;
}

.metric-delta.up { color: var(--emerald); }
.metric-delta.down { color: var(--rose); }
.metric-delta.flat { color: var(--text-tertiary); }

/* ─── CHARTS (CSS-only sparklines & bars) ─── */
.chart-area {
  height: 180px;
  display: flex;
  align-items: flex-end;
  gap: 2px;
  padding-top: 20px;
}

.chart-bar {
  flex: 1;
  background: var(--blue);
  border-radius: 2px 2px 0 0;
  min-height: 2px;
  transition: height 0.3s ease;
  position: relative;
  cursor: pointer;
  opacity: 0.7;
}

.chart-bar:hover {
  opacity: 1;
}

.chart-bar::after {
  content: attr(data-label);
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 8px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  white-space: nowrap;
}

.chart-bar.emerald { background: var(--emerald); }
.chart-bar.purple { background: var(--purple); }
.chart-bar.amber { background: var(--amber); }

/* Donut chart */
.donut-chart {
  width: 140px;
  height: 140px;
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.donut-center {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--bg-surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 1;
}

.donut-center .donut-value {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 600;
}

.donut-center .donut-label {
  font-size: 9px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

/* ─── TABLE ─── */
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.data-table thead th {
  text-align: left;
  padding: 10px 14px;
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-tertiary);
  border-bottom: 1px solid var(--border-default);
  white-space: nowrap;
}

.data-table tbody td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-subtle);
  color: var(--text-secondary);
}

.data-table tbody tr:hover td {
  background: var(--bg-hover);
  color: var(--text-primary);
}

/* ─── BADGES ─── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
}

.badge.blue { background: var(--blue-dim); color: var(--blue); }
.badge.emerald { background: var(--emerald-dim); color: var(--emerald); }
.badge.amber { background: var(--amber-dim); color: var(--amber); }
.badge.rose { background: var(--rose-dim); color: var(--rose); }
.badge.purple { background: var(--purple-dim); color: var(--purple); }

/* ─── BUTTONS ─── */
.btn {
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid var(--border-default);
  background: var(--bg-raised);
  color: var(--text-secondary);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--font-sans);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }

.btn-primary {
  background: var(--blue);
  color: white;
  border-color: transparent;
}

.btn-primary:hover { background: #2563EB; }

.btn-sm { padding: 4px 10px; font-size: 11px; }

/* ─── FORMS ─── */
.form-input {
  background: var(--bg-raised);
  border: 1px solid var(--border-default);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}

.form-input:focus { border-color: var(--blue); }

.form-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
  display: block;
}

.form-group { margin-bottom: 14px; }

.form-textarea {
  background: var(--bg-raised);
  border: 1px solid var(--border-default);
  border-radius: 6px;
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 13px;
  font-family: var(--font-sans);
  width: 100%;
  outline: none;
  resize: vertical;
  min-height: 80px;
}

.form-textarea:focus { border-color: var(--blue); }

/* ─── MODALS ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 12px;
  width: 90%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
}

.modal-header {
  padding: 18px 22px;
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h3 {
  font-size: 15px;
  font-weight: 600;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text-tertiary);
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
}

.modal-body { padding: 22px; }
.modal-footer {
  padding: 14px 22px;
  border-top: 1px solid var(--border-subtle);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}

/* ─── PROGRESS BAR ─── */
.progress-bar {
  height: 6px;
  background: var(--bg-overlay);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}

.progress-fill.blue { background: var(--blue); }
.progress-fill.emerald { background: var(--emerald); }
.progress-fill.amber { background: var(--amber); }
.progress-fill.rose { background: var(--rose); }

/* ─── LOGIN SCREEN ─── */
.login-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  background: var(--bg-root);
}

.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: 12px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
}

.login-card h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.02em;
}

.login-card .subtitle {
  color: var(--text-tertiary);
  font-size: 13px;
  margin-bottom: 28px;
}

/* ─── GRID LAYOUTS ─── */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
.grid-1-2 { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }

.gap-sm { gap: 8px; }
.gap-md { gap: 16px; }
.gap-lg { gap: 24px; }
.mb-sm { margin-bottom: 8px; }
.mb-md { margin-bottom: 16px; }
.mb-lg { margin-bottom: 24px; }
.flex { display: flex; }
.flex-center { display: flex; align-items: center; }
.flex-between { display: flex; align-items: center; justify-content: space-between; }
.flex-col { display: flex; flex-direction: column; }

/* ─── ACTIVITY FEED ─── */
.activity-item {
  display: flex;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-subtle);
}

.activity-item:last-child { border-bottom: none; }

.activity-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.activity-dot.blue { background: var(--blue); }
.activity-dot.emerald { background: var(--emerald); }
.activity-dot.amber { background: var(--amber); }
.activity-dot.rose { background: var(--rose); }
.activity-dot.purple { background: var(--purple); }

.activity-text {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.5;
}

.activity-text strong { color: var(--text-primary); font-weight: 500; }

.activity-time {
  font-size: 10px;
  font-family: var(--font-mono);
  color: var(--text-muted);
  margin-top: 2px;
}

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-tertiary);
}

.empty-state .empty-icon {
  font-size: 36px;
  opacity: 0.3;
  margin-bottom: 12px;
}

.empty-state h4 {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-overlay); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg-active); }

/* ─── TRANSITIONS ─── */
.fade-in { animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" src="dashboard.jsx?v=5"></script>
</body>
</html>
